<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadtrip 2026</title>
<style>
  :root{
    --bg:#f6f4ef; --card:#ffffff; --ink:#2b2a26; --muted:#7a766c;
    --accent:#1f6f5c; --accent2:#c2571f; --line:#e5e1d8; --chip:#eef3f1;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
  .wrap{max-width:860px;margin:0 auto;padding:24px 16px 120px}
  header.hero{text-align:center;padding:36px 12px 20px}
  header.hero h1{font-size:1.9rem;margin:0 0 6px}
  header.hero p{color:var(--muted);margin:4px 0}
  .badge{display:inline-block;background:var(--accent);color:#fff;border-radius:999px;padding:4px 14px;font-size:.85rem;margin-top:10px}
  nav.toc{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 18px;margin:20px 0}
  .toc-row{display:flex;align-items:baseline;gap:12px;padding:6px 0;border-bottom:1px solid var(--line);text-decoration:none;color:var(--ink)}
  .toc-row:last-child{border-bottom:none}
  .toc-row:hover .toc-title{text-decoration:underline}
  .toc-num{font-size:.8rem;color:var(--muted);width:38px;flex:none}
  .toc-date{font-size:.85rem;color:var(--muted);width:150px;flex:none}
  .toc-title{color:var(--accent);font-size:.92rem;flex:1}
  .toc-sections{display:flex;flex-wrap:wrap;gap:8px;padding-top:10px;margin-top:6px;border-top:1px solid var(--line)}
  .toc-sections a{display:inline-flex;align-items:center;gap:5px;color:var(--accent);background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:5px 13px;font-size:.85rem;text-decoration:none}
  .toc-sections a:hover{background:#e2ece8}
  .day,.section{background:var(--card);border:1px solid var(--line);border-radius:16px;margin:22px 0;overflow:hidden}
  .day-head{display:flex;align-items:center;gap:10px;padding:16px 20px;background:linear-gradient(90deg,#1f6f5c,#2b8a72);color:#fff}
  .day-head-main{flex:1;min-width:0;display:flex;flex-wrap:wrap;align-items:baseline;gap:6px}
  .day:not(.edit) .day-head{cursor:pointer}
  .day-head h2{margin:0;font-size:1.15rem}
  .day-head .date{opacity:.9;font-size:.9rem}
  .distchip{font-size:.8rem;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:999px;padding:2px 10px}
  .collapse-ind{flex:none;transition:transform .2s}
  .day.collapsed .collapse-ind{transform:rotate(-90deg)}
  .day-collapse-btn{flex:none;background:transparent;border:none;color:#fff;cursor:pointer;padding:4px;display:inline-flex;align-items:center}
  .day.collapsed .day-body{display:none}
  .day-body{padding:16px 20px 20px}
  table.sched{width:100%;border-collapse:collapse;margin:8px 0 14px}
  table.sched td{padding:7px 6px;border-bottom:1px solid var(--line);vertical-align:top;font-size:.95rem}
  table.sched td.t{white-space:nowrap;font-weight:600;color:var(--accent);width:1%;padding-right:12px}
  table.sched td p{margin:0}
  table.sched tr.clickable{cursor:pointer}
  table.sched tr.done td{color:var(--muted)}
  table.sched tr.done td.t{color:var(--muted);font-weight:500}
  table.sched tr.done .rowtext{text-decoration:line-through}
  .rowcheck{color:var(--accent);margin-right:5px;vertical-align:middle}
  .bk-day{margin-left:auto;font-size:.8rem;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:3px}
  .bk-daylinks{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 2px}
  .bk-daylinks a{font-size:.82rem;color:var(--accent);background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:3px 11px;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
  .maps a{display:inline-flex;align-items:center;gap:5px;background:var(--chip);border:1px solid var(--line);color:var(--accent);text-decoration:none;border-radius:10px;padding:8px 14px;margin:4px 6px 4px 0;font-size:.9rem}
  .maps a:hover{background:#e2ece8}
  .section{padding:20px}
  .section h2{margin:0 0 10px;font-size:1.2rem;color:var(--accent)}
  .section h3, .day-body h3{margin:16px 0 6px;font-size:1.02rem}
  ul{margin:6px 0 12px;padding-left:22px}
  li{margin:3px 0}
  li p{margin:0;display:inline}
  a{color:var(--accent)}
  footer{text-align:center;color:var(--muted);font-size:.85rem;margin-top:36px}
  footer p{margin:4px 0}

  /* admonitions (markdown > [!TIP] osv.) */
  .adm{border-radius:0 10px 10px 0;padding:10px 14px;margin:12px 0;font-size:.92rem}
  .adm p{margin:4px 0}
  .adm-t{font-weight:700;font-size:.85rem;margin-bottom:2px}
  .adm-tip{background:#eef3f1;border-left:4px solid var(--accent)}
  .adm-tip .adm-t{color:var(--accent)}
  .adm-note{background:#fdf6ee;border-left:4px solid var(--accent2)}
  .adm-note .adm-t{color:var(--accent2)}
  .adm-warning,.adm-caution{background:#fdefee;border-left:4px solid #b3352f}
  .adm-warning .adm-t,.adm-caution .adm-t{color:#b3352f}
  .adm-important{background:#f0eefa;border-left:4px solid #5b4ea8}
  .adm-important .adm-t{color:#5b4ea8}

  /* sjekklister */
  .chkrow{display:flex;align-items:flex-start;gap:9px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .chkrow input[type=checkbox]{transform:scale(1.25);accent-color:var(--accent);cursor:pointer;margin-top:4px;flex:none}
  .chkrow.done .chktext{opacity:.5;text-decoration:line-through}
  .chktext{flex:1}

  /* bilder */
  .imgs{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
  .imgwrap{position:relative;flex:1 1 250px;max-width:100%}
  .imgs img{width:100%;border-radius:12px;display:block;border:1px solid var(--line)}
  .imgdel{position:absolute;top:8px;right:8px}

  /* bestillinger & betalinger */
  .bookings{display:flex;flex-direction:column;gap:10px;margin:10px 0}
  .bk{border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:#fbfaf7}
  .bk-head{display:flex;align-items:center;gap:8px}
  .bk-title{font-weight:600;color:var(--accent);text-decoration:none}
  .bk-title:hover{text-decoration:underline}
  .bk-paid{margin-left:auto;font-size:.78rem;color:var(--accent);background:var(--chip);border-radius:999px;padding:2px 10px;display:inline-flex;align-items:center;gap:3px}
  .bk-unpaid{margin-left:auto;font-size:.78rem;color:var(--accent2);border:1px solid #f0d3bd;border-radius:999px;padding:2px 10px}
  .bk-meta{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:6px;font-size:.85rem;color:var(--muted)}
  .bk-meta a{color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:3px}
  .bk.edit{display:flex;flex-direction:column;gap:7px}
  .bk-grid{display:flex;gap:7px}
  .bk-grid>*{flex:1;min-width:0}
  .bk-tools{display:flex;gap:6px;justify-content:flex-end}
  .bk-kind{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font:inherit;font-size:16px;background:#fffdf8;box-sizing:border-box}
  .bk-paidbox{font-size:.95rem;color:var(--ink);display:flex;align-items:center;gap:8px;padding:2px 0}
  .bk-paidbox input{width:20px;height:20px;accent-color:var(--accent)}

  /* notater */
  .notes{margin-top:14px}
  .notes label{font-size:.85rem;color:var(--muted);display:block;margin-bottom:4px}
  .notes textarea{width:100%;min-height:60px;border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit;font-size:.9rem;background:#fbfaf7;resize:vertical}

  /* redigeringsmodus */
  .toolbar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20;background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:999px;padding:8px 10px;box-shadow:0 4px 20px rgba(0,0,0,.12)}
  .toolbar:empty{display:none}
  button.btn{border:none;border-radius:999px;padding:9px 18px;font-size:.92rem;cursor:pointer;background:var(--chip);color:var(--accent);font-weight:600}
  button.btn.primary{background:var(--accent);color:#fff}
  button.btn.danger{background:#fdefee;color:#b3352f}
  button.mini{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:8px;padding:6px 9px;font-size:.85rem;cursor:pointer;line-height:1;display:inline-flex;align-items:center;justify-content:center;gap:4px;min-width:34px;min-height:32px}
  button.mini:hover{color:#b3352f;border-color:#e8b7b4}
  button.mini.del{color:#b3352f;border-color:#e8b7b4}
  button.add{border:1px dashed var(--accent);background:transparent;color:var(--accent);border-radius:10px;padding:8px 15px;font-size:.9rem;cursor:pointer;margin:8px 6px 0 0}
  .edit input[type=text], .edit textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font:inherit;font-size:16px;background:#fffdf8;box-sizing:border-box}
  .edit textarea{resize:vertical;min-height:30px}
  .edit textarea.md{min-height:90px;font-family:ui-monospace,Menlo,monospace;font-size:.82rem}
  .erow{display:flex;gap:8px;margin:8px 0;align-items:flex-start}
  .erow .time{width:72px;flex:0 0 72px}
  .erow .grow{flex:1;min-width:0}
  .ecol{display:flex;flex-direction:column;gap:3px;flex:none}
  .ehead{display:flex;flex-direction:column;gap:8px;width:100%}
  .ehead input{background:rgba(255,255,255,.95)}
  .mdhint{font-size:.78rem;color:var(--muted);margin-top:2px}
  .editing-banner{position:sticky;top:0;z-index:15;background:var(--accent2);color:#fff;text-align:center;padding:6px;font-size:.88rem;border-radius:0 0 10px 10px}
  #sync{position:fixed;bottom:74px;right:16px;background:var(--accent);color:#fff;padding:6px 14px;border-radius:999px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:19}
  #sync.show{opacity:1}
  .uplbl{display:inline-block;border:1px dashed var(--accent);color:var(--accent);border-radius:10px;padding:6px 14px;font-size:.88rem;cursor:pointer;margin-top:6px}
  /* inline per-dag/seksjon-redigering */
  .editbtn{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:5px 8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex:none}
  .editbtn:hover{color:var(--accent);border-color:var(--accent)}
  .day-head .editbtn{border-color:rgba(255,255,255,.45);color:#fff;background:rgba(255,255,255,.12)}
  .dayhead-btns{display:flex;flex-direction:column;align-items:center;gap:8px;flex:none}
  .collapse-all-wrap{display:flex;justify-content:flex-end;margin:16px 2px -8px}
  .collapse-all{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:5px 12px;font-size:.85rem;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .collapse-all:hover{color:var(--accent);border-color:var(--accent)}
  .editctl{display:flex;gap:8px;margin-bottom:14px}
  .sechead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .sechead h2{margin:0;flex:1}
  .introwrap,.footerwrap{position:relative;min-height:30px}
  .introwrap>.editbtn,.footerwrap>.editbtn{position:absolute;top:0;right:0;z-index:2}
  .lucide{display:inline-block;vertical-align:middle;flex-shrink:0;pointer-events:none}
  button .lucide, label .lucide, a .lucide{margin-right:4px}
  button.mini .lucide{margin-right:0}
</style>
</head>
<body>
<div id="banner"></div>
<div class="wrap" id="app"><p style="text-align:center;color:#7a766c">Laster…</p></div>
<div id="toolbar" class="toolbar"></div>
<div id="sync">Lagret</div>

<script src="/vendor/marked.min.js"></script>
<script src="/vendor/purify.min.js"></script>
<script src="/vendor/lucide.min.js"></script>
<script>
"use strict";
/* ============ tilstand ============ */
let C = null;          // innholdsdokumentet fra serveren
let editing = false;   // settes per element under render (editId===elementets id)
let editId = null;     // id-en til dagen/seksjonen som redigeres nå (eller 'hero'/'intro'/'footer'), null = ingenting
let scrollAnchor = null; // engangs-anker for å bevare scroll ved neste render
let dirty = false;
let collapsed = null;  // {dagId: true/false} – kollaps-tilstand for dager (ikke lagret)

const app = document.getElementById("app");
const toolbar = document.getElementById("toolbar");
const banner = document.getElementById("banner");
const uid = () => "x" + Math.random().toString(36).slice(2, 9);

function iconHtml(name, size=14){
  if(typeof lucide === 'undefined') return '';
  const pascal = name.replace(/(^|-)([a-z0-9])/g, (_,__,c) => c.toUpperCase());
  const data = lucide[pascal];
  if(!data) return '';
  const kids = data.map(([tag,attrs])=>{
    const a = Object.entries(attrs||{}).map(([k,v])=>`${k}="${v}"`).join(' ');
    return `<${tag} ${a}/>`;
  }).join('');
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;margin-right:4px">${kids}</svg>`;
}
function icon(name, size=14){
  if(typeof lucide === 'undefined') return document.createTextNode('');
  const pascal = name.replace(/(^|-)([a-z0-9])/g, (_,__,c) => c.toUpperCase());
  const data = lucide[pascal];
  if(!data) return document.createTextNode('');
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS,'svg');
  svg.setAttribute('width', size); svg.setAttribute('height', size);
  svg.setAttribute('viewBox','0 0 24 24'); svg.setAttribute('fill','none');
  svg.setAttribute('stroke','currentColor'); svg.setAttribute('stroke-width','2');
  svg.setAttribute('stroke-linecap','round'); svg.setAttribute('stroke-linejoin','round');
  svg.style.cssText='display:inline-block;vertical-align:middle;flex-shrink:0';
  for(const [tag, attrs] of data){
    const el=document.createElementNS(NS,tag);
    for(const [k,v] of Object.entries(attrs||{})) el.setAttribute(k,v);
    svg.appendChild(el);
  }
  return svg;
}

/* ============ markdown m/ GitHub-admonitions ============ */
const ADM = {
  tip:      iconHtml('lightbulb')     + "Tips",
  note:     iconHtml('info')          + "Merk",
  warning:  iconHtml('triangle-alert')+ "Obs",
  important:iconHtml('circle-alert')  + "Viktig",
  caution:  iconHtml('triangle-alert')+ "Advarsel"
};
function preAdm(src){
  const lines = String(src||"").split("\n"), out=[]; let i=0;
  while(i<lines.length){
    const m = lines[i].match(/^>\s*\[!(TIP|NOTE|WARNING|IMPORTANT|CAUTION)\]\s*$/i);
    if(m){
      i++; const buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,"")); i++; }
      const t = m[1].toLowerCase();
      out.push(`<div class="adm adm-${t}"><div class="adm-t">${ADM[t]}</div>${marked.parse(buf.join("\n"))}</div>`);
    } else { out.push(lines[i]); i++; }
  }
  return out.join("\n");
}
function md(src){
  return DOMPurify.sanitize(marked.parse(preAdm(src)), {ADD_ATTR:["target"]});
}
function mdInline(src){
  return DOMPurify.sanitize(marked.parseInline(String(src||"")), {ADD_ATTR:["target"]});
}

/* ============ hjelpere ============ */
function el(tag, attrs, ...kids){
  const n = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})){
    if(k==="class") n.className=v;
    else if(k==="html") n.innerHTML=v;
    else if(k.startsWith("on")) n.addEventListener(k.slice(2), v);
    else n.setAttribute(k, v);
  }
  for(const k of kids) if(k!=null) n.append(k);
  return n;
}
function inp(value, placeholder, oninput, cls){
  const i = el("input",{type:"text",class:cls||"",placeholder:placeholder||""});
  i.value = value||"";
  i.addEventListener("input",()=>{oninput(i.value); dirty=true;});
  return i;
}
function ta(value, placeholder, oninput, cls){
  const t = el("textarea",{class:cls||"",placeholder:placeholder||"",rows:1});
  t.value = value||"";
  t.addEventListener("input",()=>{oninput(t.value); dirty=true; autosize(t);});
  requestAnimationFrame(()=>autosize(t));
  return t;
}
function autosize(t){ t.style.height="auto"; t.style.height=(t.scrollHeight+2)+"px"; }
function move(arr,i,dir){ const j=i+dir; if(j<0||j>=arr.length)return; [arr[i],arr[j]]=[arr[j],arr[i]]; render(); dirty=true; }

/* dager som er passert kollapses automatisk ved lasting */
const MONTHS = {januar:0,februar:1,mars:2,april:3,mai:4,juni:5,juli:6,august:7,september:8,oktober:9,november:10,desember:11};
function dayDate(d){
  const m = String(d && d.date || "").match(/(\d{1,2})\.?\s+(januar|februar|mars|april|mai|juni|juli|august|september|oktober|november|desember)/i);
  if(!m) return null;
  return new Date(new Date().getFullYear(), MONTHS[m[2].toLowerCase()], parseInt(m[1],10));
}
function isPastDay(d){
  const dt = dayDate(d); if(!dt) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return dt < today;
}
function initCollapse(){
  if(collapsed) return;               // bare første gang – bevar manuelle valg
  collapsed = {};
  for(const d of (C.days||[])) collapsed[d.id] = isPastDay(d);
}
function flash(msg){
  const s=document.getElementById("sync"); s.textContent=msg||"Lagret";
  s.classList.add("show"); clearTimeout(flash.t); flash.t=setTimeout(()=>s.classList.remove("show"),1400);
}
async function api(url, opts){
  const r = await fetch(url, opts);
  if(r.status===401){ location.reload(); throw new Error("401"); }
  return r;
}

/* ============ inline-redigering: knapper, kontroller, scroll-bevaring ============ */
function editBtn(id){
  return el("button",{class:"editbtn",title:"Rediger",onclick:(e)=>{e.stopPropagation();startEdit(id);}},icon("pencil",15));
}
function renderEditBar(){
  toolbar.innerHTML="";
  if(!editId) return;
  toolbar.append(
    el("button",{class:"btn primary",onclick:()=>saveEdit(editId)},icon("save",15)," Lagre"),
    el("button",{class:"btn",onclick:()=>cancelEdit(editId)},icon("x",15)," Avbryt"));
}
function startEdit(id){
  if(editId && editId!==id && dirty && !confirm("Du har ulagrede endringer. Forkaste dem og redigere noe annet?")) return;
  editId = id; dirty = false;
  if(collapsed && id in collapsed) collapsed[id]=false;  // vis dagen
  render();  // editId er anker → scroll bevares
}
async function saveEdit(id){
  const r = await api("/api/content",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(C)});
  if(r.status===409){
    alert("Noen andre har lagret i mellomtiden. Siden lastes på nytt – endringene dine må dessverre gjøres om.");
    await load(); editId=null; dirty=false; render(); return;
  }
  if(r.ok){ const j=await r.json(); C.rev=j.rev; dirty=false; editId=null; scrollAnchor=id; render(); flash("Lagret"); }
  else flash("Lagring feilet");
}
async function cancelEdit(id){
  if(dirty && !confirm("Forkaste endringene?")) return;
  await load(); editId=null; dirty=false; scrollAnchor=id; render();
}

/* ============ visning ============ */
function render(){
  const aid = scrollAnchor || editId;
  const before = aid ? document.getElementById(aid)?.getBoundingClientRect().top : null;
  initCollapse();
  app.innerHTML="";
  banner.innerHTML="";

  // hero (tittel)
  editing = (editId==='hero');
  const hero = el("header",{class:"hero"+(editing?" edit":""),id:"hero"});
  if(editing){
    hero.append(inp(C.hero.title,"Tittel",v=>C.hero.title=v));
  } else {
    hero.append(el("h1",{},C.hero.title), editBtn('hero'));
  }
  app.append(hero);

  // toc (kun når ingenting redigeres)
  if(!editId){
    const toc = el("nav",{class:"toc"});
    for(const d of C.days){
      const num = d.title.match(/^Dag (\d+)/)?.[1];
      const title = d.title.replace(/^Dag \d+\s*[·\-]\s*/,"");
      toc.append(el("a",{class:"toc-row",href:"#"+d.id},
        el("span",{class:"toc-num"}, num ? "Dag "+num : ""),
        el("span",{class:"toc-date"}, d.date||""),
        el("span",{class:"toc-title"}, title)
      ));
    }
    if(C.sections.length){
      const sec = el("div",{class:"toc-sections"});
      for(const s of C.sections) sec.append(el("a",{href:"#"+s.id}, icon("link",13), s.title));
      toc.append(sec);
    }
    app.append(toc);
  }

  // intro
  editing = (editId==='intro');
  if(editing){
    const box = el("div",{class:"section edit",id:"intro"});
    box.append(el("h2",{},"Intro (markdown)"), ta(C.intro,"",v=>C.intro=v,"md"), mdHint());
    app.append(box);
  } else {
    const wrap = el("div",{class:"introwrap",id:"intro"});
    if(!editId) wrap.append(editBtn('intro'));
    if(C.intro) wrap.append(el("div",{html:md(C.intro)}));
    app.append(wrap);
  }

  // åpne/kollaps alle dager (kun i visning)
  if(!editId && C.days.length){
    const anyOpen = C.days.some(d=>!collapsed[d.id]);
    app.append(el("div",{class:"collapse-all-wrap"},
      el("button",{class:"collapse-all",onclick:()=>{
        for(const d of C.days) collapsed[d.id]=anyOpen;
        render();
      }}, icon(anyOpen?"chevrons-down-up":"chevrons-up-down",14), anyOpen?" Kollaps alle":" Åpne alle")));
  }

  // dager
  C.days.forEach((d,di)=>{ editing=(editId===d.id); app.append(renderDay(d,di)); });
  editing=false;
  if(!editId) app.append(el("button",{class:"add",onclick:()=>{
    const nd={id:uid(),title:"Dag "+(C.days.length+1)+" · Ny dag",date:"",chip:"",rows:[{time:"09:00",text:"…"}],maps:[],images:[],blocks:[],bookings:[]};
    C.days.push(nd); collapsed[nd.id]=false; editId=nd.id; dirty=true; render();
  }},icon("plus",13)," Legg til dag"));

  // seksjoner
  C.sections.forEach((s,si)=>{ editing=(editId===s.id); app.append(renderSection(s,si)); });
  editing=false;
  if(!editId) app.append(el("button",{class:"add",onclick:()=>{
    const ns={id:uid(),title:"Ny seksjon",blocks:[{type:"md",md:"Skriv her…"}]};
    C.sections.push(ns); editId=ns.id; dirty=true; render();
  }},icon("plus",13)," Legg til seksjon"));

  // footer
  editing = (editId==='footer');
  if(editing){
    const f = el("div",{class:"section edit",id:"footer"});
    f.append(el("h2",{},"Bunntekst (markdown)"), ta(C.footer,"",v=>C.footer=v,"md"));
    app.append(f);
  } else {
    const wrap = el("div",{class:"footerwrap",id:"footer"});
    if(!editId) wrap.append(editBtn('footer'));
    if(C.footer) wrap.append(el("footer",{html:md(C.footer)}));
    app.append(wrap);
  }
  editing=false;

  renderEditBar();
  requestAnimationFrame(()=>{
    if(editId) app.querySelectorAll("textarea").forEach(autosize);
    if(aid && before!=null){
      const elNow = document.getElementById(aid);
      if(elNow){ const after = elNow.getBoundingClientRect().top; window.scrollBy(0, after-before); }
    }
    scrollAnchor=null;
  });
}

function mdHint(){
  return el("div",{class:"mdhint"},"Markdown: **fet**, [lenke](url), - liste, > [!TIP] / [!NOTE] / [!WARNING] for tips-bokser");
}

/* ============ bestillinger & betalinger ============ */
const BOOKING_KINDS = [
  ["overnatting","Overnatting","bed"],
  ["transport","Transport","car"],
  ["aktivitet","Aktivitet","ticket"],
  ["mat","Servering","utensils"],
  ["annet","Annet","receipt"],
];
function kindMeta(kind){ return BOOKING_KINDS.find(k=>k[0]===kind) || BOOKING_KINDS[BOOKING_KINDS.length-1]; }
// Kart-lenke som ruter fra NÅVÆRENDE posisjon til målet.
// Apple Maps bruker current location som start når saddr utelates.
function mapUrl(loc){
  loc = String(loc||"").trim();
  if(!loc) return "";
  const m = loc.match(/[?&](?:daddr|destination|q|query)=([^&]+)/i); // trekk ut mål fra ferdig lenke
  if(/^https?:\/\//i.test(loc)) return m ? "https://maps.apple.com/?daddr="+m[1]+"&dirflg=d" : loc;
  return "https://maps.apple.com/?daddr=" + encodeURIComponent(loc) + "&dirflg=d";
}

function bookingCardView(b){
  const card = el("div",{class:"bk",id:"bkref-"+b.id});
  const head = el("div",{class:"bk-head"}, icon(kindMeta(b.kind)[2],17));
  head.append(b.url
    ? el("a",{class:"bk-title",href:b.url,target:"_blank",rel:"noopener"}, b.title||"(uten navn)")
    : el("span",{class:"bk-title"}, b.title||"(uten navn)"));
  if(b.paid) head.append(el("span",{class:"bk-paid"}, icon("check",13)," Betalt"));
  else if(b.amount) head.append(el("span",{class:"bk-unpaid"}, "Ikke betalt"));
  card.append(head);
  const meta = el("div",{class:"bk-meta"});
  if(b.date) meta.append(el("span",{}, b.date));
  if(b.amount) meta.append(el("span",{}, b.amount));
  if(b.ref) meta.append(el("span",{}, "Ref: "+b.ref));
  if(b.location) meta.append(el("a",{href:mapUrl(b.location),target:"_blank",rel:"noopener"}, icon("map-pin",12)," Kart"));
  if(b.email) meta.append(el("a",{href:b.email,target:"_blank",rel:"noopener"}, icon("mail",12)," E-post"));
  if(b.day){
    const day = (C.days||[]).find(d=>d.id===b.day);
    if(day){ const n = day.title.match(/^Dag (\d+)/)?.[1]||""; meta.append(el("a",{href:"#"+b.day}, "Dag "+n, icon("arrow-right",12))); }
  }
  if(meta.children.length) card.append(meta);
  return card;
}

function bookingCardEdit(b, list, i){
  const card = el("div",{class:"bk edit"});
  card.append(el("div",{class:"bk-tools"},
    el("button",{class:"mini",title:"Flytt opp",onclick:()=>move(list,i,-1)},icon("chevron-up",14)),
    el("button",{class:"mini",title:"Flytt ned",onclick:()=>move(list,i,1)},icon("chevron-down",14)),
    el("button",{class:"mini del",title:"Slett",onclick:()=>{list.splice(i,1);render();dirty=true;}},icon("trash-2",16))
  ));
  card.append(inp(b.title,"Tittel (f.eks. Airbnb – Stavanger)",v=>b.title=v));
  const sel = el("select",{class:"bk-kind",onchange:e=>{b.kind=e.target.value;dirty=true;}});
  for(const [val,label] of BOOKING_KINDS){ const o=el("option",{value:val},label); if((b.kind||"overnatting")===val)o.selected=true; sel.append(o); }
  card.append(el("div",{class:"bk-grid"}, sel, inp(b.date,"Dato",v=>b.date=v)));
  card.append(inp(b.url,"Lenke (Airbnb/booking)",v=>b.url=v));
  card.append(inp(b.location,"Sted/adresse (åpnes i kart)",v=>b.location=v));
  card.append(el("div",{class:"bk-grid"}, inp(b.ref,"Ref/bekreftelse",v=>b.ref=v), inp(b.amount,"Beløp",v=>b.amount=v)));
  card.append(inp(b.email,"E-post-lenke (valgfri)",v=>b.email=v));
  const daySel = el("select",{class:"bk-kind",onchange:e=>{b.day=e.target.value||undefined;dirty=true;}});
  daySel.append(el("option",{value:""},"Knytt til dag: (ingen)"));
  for(const dd of (C.days||[])){ const o=el("option",{value:dd.id}, "Knytt til "+dd.title); if(b.day===dd.id)o.selected=true; daySel.append(o); }
  card.append(daySel);
  const pl = el("label",{class:"bk-paidbox"});
  const cb = el("input",{type:"checkbox"}); cb.checked=!!b.paid;
  cb.addEventListener("change",()=>{b.paid=cb.checked;dirty=true;});
  pl.append(cb, "Betalt");
  card.append(pl);
  return card;
}

function bookingsList(list){
  const wrap = el("div",{class:"bookings"});
  (list||[]).forEach((b,i)=> wrap.append(editing ? bookingCardEdit(b,list,i) : bookingCardView(b)));
  if(editing) wrap.append(el("button",{class:"add",onclick:()=>{
    list.push({id:uid(),title:"",kind:"overnatting",url:"",location:"",ref:"",date:"",amount:"",paid:false,email:""});
    render(); dirty=true;
  }}, icon("plus",13)," Bestilling"));
  return wrap;
}

function renderDay(d, di){
  const card = el("div",{class:"day"+(editing?" edit":""),id:d.id});
  const head = el("div",{class:"day-head"});
  if(editing){
    const grid = el("div",{class:"ehead"},
      inp(d.title,"Tittel",v=>d.title=v),
      inp(d.date,"Dato (f.eks. Lørdag 18. juli)",v=>d.date=v),
      inp(d.chip,"Merkelapp (f.eks. ~230 km)",v=>d.chip=v));
    head.append(grid);
  } else {
    const main = el("div",{class:"day-head-main"},
      el("h2",{},d.title), el("span",{class:"date"},d.date||""));
    if(d.chip) main.append(el("span",{class:"distchip"},d.chip));
    const chev = icon("chevron-down",22);
    if(chev.classList) chev.classList.add("collapse-ind");
    head.append(main, el("div",{class:"dayhead-btns"}, chev, editBtn(d.id)));
    if(collapsed[d.id]) card.classList.add("collapsed");
    head.addEventListener("click",(e)=>{
      if(e.target.closest(".editbtn")) return;
      const now = !card.classList.contains("collapsed");
      card.classList.toggle("collapsed", now);
      collapsed[d.id] = now;
    });
  }
  card.append(head);
  const body = el("div",{class:"day-body"});

  // lenker til globale bestillinger som er knyttet til denne dagen
  if(!editing){
    const refs = [];
    for(const s of C.sections||[]) for(const bl of s.blocks||[]) if(bl.type==="bookings") for(const it of bl.items||[]) if(it.day===d.id) refs.push(it);
    if(refs.length){
      const dl = el("div",{class:"bk-daylinks"});
      for(const it of refs) dl.append(el("a",{href:"#bkref-"+it.id}, it.title||"Bestilling", icon("arrow-right",13)));
      body.append(dl);
    }
  }

  // tidsplan
  if(editing){
    d.rows.forEach((r,ri)=>{
      body.append(el("div",{class:"erow"},
        el("div",{class:"ecol"},
          el("button",{class:"mini",title:"Flytt opp",onclick:()=>move(d.rows,ri,-1)},icon("chevron-up",12)),
          el("button",{class:"mini",title:"Flytt ned",onclick:()=>move(d.rows,ri,1)},icon("chevron-down",12))),
        (()=>{const i=inp(r.time,"kl.",v=>r.time=v);i.classList.add("time");return i;})(),
        (()=>{const t=ta(r.text,"Beskrivelse (markdown)",v=>r.text=v);t.classList.add("grow");return t;})(),
        el("button",{class:"mini del",title:"Slett rad",onclick:()=>{d.rows.splice(ri,1);render();dirty=true;}},icon("trash-2",16))
      ));
    });
    body.append(el("button",{class:"add",onclick:()=>{d.rows.push({time:"",text:""});render();dirty=true;}},icon("plus",13)," Rad"));
  } else if(d.rows.length){
    const tb = el("table",{class:"sched"});
    d.rows.forEach((r,ri)=>{
      const textTd = el("td",{});
      const chk = el("span",{class:"rowcheck"});
      if(r.done){ const c=icon("check",13); if(c.classList)c.classList.add("rowcheck-i"); chk.append(c); }
      textTd.append(chk, el("span",{class:"rowtext",html:mdInline(r.text)}));
      const tr = el("tr",{class:"clickable"+(r.done?" done":"")}, el("td",{class:"t"},r.time), textTd);
      tr.addEventListener("click",(e)=>{
        if(e.target.closest("a")) return;              // la lenker i teksten fungere
        r.done = !r.done;
        tr.classList.toggle("done", r.done);
        chk.innerHTML="";
        if(r.done){ const c=icon("check",13); chk.append(c); }
        api("/api/rowcheck",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({day:d.id,index:ri,value:r.done})}).then(()=>flash());
      });
      tb.append(tr);
    });
    body.append(tb);
  }

  // kartlenker
  if(editing){
    body.append(el("h3",{},"Kartlenker"));
    d.maps.forEach((m,mi)=>{
      body.append(el("div",{class:"erow"},
        (()=>{const i=inp(m.label,"Etikett",v=>m.label=v);i.classList.add("grow");return i;})(),
        (()=>{const i=inp(m.url,"https://maps.apple.com/…",v=>m.url=v);i.classList.add("grow");return i;})(),
        el("button",{class:"mini del",onclick:()=>{d.maps.splice(mi,1);render();dirty=true;}},icon("trash-2",16))));
    });
    body.append(el("button",{class:"add",onclick:()=>{d.maps.push({label:"",url:""});render();dirty=true;}},icon("plus",13)," Kartlenke"));
  } else if(d.maps.length){
    const m = el("div",{class:"maps"});
    for(const l of d.maps){
      const label = String(l.label||"").replace(/^\s*apple maps:\s*/i,"");
      m.append(el("a",{href:mapUrl(l.url),target:"_blank",rel:"noopener"}, icon("map",14), label));
    }
    body.append(m);
  }

  // bestillinger på dagen
  if((d.bookings && d.bookings.length) || editing){
    if(editing) d.bookings = d.bookings || [];
    body.append(el("h3",{},"Bestillinger"));
    body.append(bookingsList(d.bookings));
  }

  // bilder
  if(d.images.length || editing){
    const g = el("div",{class:"imgs"});
    d.images.forEach((im,ii)=>{
      const w = el("div",{class:"imgwrap"}, el("img",{src:im.url,alt:im.caption||"",loading:"lazy"}));
      if(editing) w.append(el("button",{class:"mini del imgdel",onclick:()=>{d.images.splice(ii,1);render();dirty=true;}},icon("trash-2",16)));
      g.append(w);
    });
    body.append(g);
    if(editing){
      const fi = el("input",{type:"file",accept:"image/*",multiple:"",style:"display:none"});
      fi.addEventListener("change",async ()=>{
        for(const f of fi.files){
          flash("Laster opp …");
          const r = await api("/api/upload?name="+encodeURIComponent(f.name),{method:"POST",body:f});
          if(r.ok){ const j=await r.json(); d.images.push({url:j.url,caption:""}); dirty=true; }
          else flash("Opplasting feilet");
        }
        render();
      });
      const lbl = el("label",{class:"uplbl"},icon("image-plus",14)," Last opp bilde(r)");
      lbl.append(fi);
      body.append(lbl);
    }
  }

  // markdown-blokker (tips m.m.)
  d.blocks.forEach((b,bi)=>{
    if(editing){
      body.append(el("div",{class:"erow"},
        (()=>{const t=ta(b.md,"Markdown – bruk > [!TIP] for tipsboks",v=>b.md=v,"md");t.classList.add("grow");return t;})(),
        el("button",{class:"mini del",onclick:()=>{d.blocks.splice(bi,1);render();dirty=true;}},icon("trash-2",16))));
    } else {
      body.append(el("div",{html:md(b.md)}));
    }
  });
  if(editing){
    body.append(el("button",{class:"add",onclick:()=>{d.blocks.push({md:"> [!TIP]\n> Nytt tips…"});render();dirty=true;}},icon("plus",13)," Tips/tekstblokk"), mdHint());
    body.append(el("div",{style:"margin-top:14px"},
      el("button",{class:"btn danger",onclick:()=>{
        if(confirm("Slette hele «"+d.title+"»?")){ C.days.splice(di,1); render(); dirty=true; }
      }},icon("trash-2",14)," Slett dag"),
      " ",
      el("button",{class:"mini",onclick:()=>move(C.days,di,-1)},icon("chevron-up",12)," Flytt dag"),
      el("button",{class:"mini",onclick:()=>move(C.days,di,1)},icon("chevron-down",12)," Flytt dag")));
  }

  // felles notat (alltid aktivt, lagres live)
  const nw = el("div",{class:"notes"}, el("label",{},icon("notebook-pen",13)," Felles notater"));
  const nt = el("textarea",{placeholder:"Skriv her – synkes mellom dere…"});
  nt.value = (C.notes && C.notes[d.id]) || "";
  let timer;
  nt.addEventListener("input",()=>{
    C.notes = C.notes||{}; C.notes[d.id]=nt.value;
    clearTimeout(timer);
    timer=setTimeout(async()=>{ await api("/api/note",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:d.id,text:nt.value})}); flash(); },800);
  });
  nw.append(nt);
  body.append(nw);

  card.append(body);
  return card;
}

function renderSection(s, si){
  const card = el("div",{class:"section"+(editing?" edit":""),id:s.id});
  if(editing){
    card.append(inp(s.title,"Seksjonstittel",v=>s.title=v));
  } else {
    card.append(el("div",{class:"sechead"}, el("h2",{},s.title), editBtn(s.id)));
  }

  s.blocks.forEach((b,bi)=>{
    if(b.type==="checklist"){
      const box = el("div",{});
      if(editing){
        box.append(el("div",{style:"margin:14px 0 4px"}, inp(b.title,"Gruppetittel (valgfri)",v=>b.title=v)));
        b.items.forEach((it,ii)=>{
          box.append(el("div",{class:"erow"},
            el("div",{class:"ecol"},
              el("button",{class:"mini",onclick:()=>move(b.items,ii,-1)},icon("chevron-up",12)),
              el("button",{class:"mini",onclick:()=>move(b.items,ii,1)},icon("chevron-down",12))),
            (()=>{const t=ta(it.text,"Punkt (markdown)",v=>it.text=v);t.classList.add("grow");return t;})(),
            el("button",{class:"mini del",onclick:()=>{b.items.splice(ii,1);render();dirty=true;}},icon("trash-2",16))));
        });
        box.append(el("button",{class:"add",onclick:()=>{b.items.push({id:uid(),text:"",done:false});render();dirty=true;}},icon("plus",13)," Punkt"),
                   el("button",{class:"add",onclick:()=>{if(confirm("Slette hele sjekklisten?")){s.blocks.splice(bi,1);render();dirty=true;}}},icon("trash-2",16)," Slett sjekkliste"));
      } else {
        if(b.title) box.append(el("h3",{},b.title));
        b.items.forEach(it=>{
          const row = el("div",{class:"chkrow"+(it.done?" done":"")});
          const cb = el("input",{type:"checkbox"});
          cb.checked = !!it.done;
          cb.addEventListener("change",async()=>{
            it.done = cb.checked; row.classList.toggle("done",it.done);
            await api("/api/check",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:it.id,value:it.done})});
            flash();
          });
          row.append(cb, el("div",{class:"chktext",html:mdInline(it.text)}));
          box.append(row);
        });
      }
      card.append(box);
    } else if(b.type==="bookings"){
      const box = el("div",{});
      if(editing){
        box.append(el("div",{style:"margin:14px 0 4px"}, inp(b.title,"Gruppetittel (valgfri)",v=>b.title=v)));
      } else if(b.title){
        box.append(el("h3",{},b.title));
      }
      b.items = b.items || [];
      box.append(bookingsList(b.items));
      if(editing){
        box.append(el("button",{class:"add",onclick:()=>{if(confirm("Slette hele bestillings-blokken?")){s.blocks.splice(bi,1);render();dirty=true;}}},icon("trash-2",16)," Slett blokk"));
      }
      card.append(box);
    } else { // md
      if(editing){
        card.append(el("div",{class:"erow"},
          (()=>{const t=ta(b.md,"Markdown",v=>b.md=v,"md");t.classList.add("grow");return t;})(),
          el("button",{class:"mini del",onclick:()=>{s.blocks.splice(bi,1);render();dirty=true;}},icon("trash-2",16))));
      } else {
        card.append(el("div",{html:md(b.md)}));
      }
    }
  });

  if(editing){
    card.append(el("div",{style:"margin-top:10px"},
      el("button",{class:"add",onclick:()=>{s.blocks.push({type:"md",md:""});render();dirty=true;}},icon("plus",13)," Tekstblokk"),
      el("button",{class:"add",onclick:()=>{s.blocks.push({type:"checklist",title:"",items:[{id:uid(),text:"",done:false}]});render();dirty=true;}},icon("plus",13)," Sjekkliste"),
      el("button",{class:"add",onclick:()=>{s.blocks.push({type:"bookings",title:"",items:[]});render();dirty=true;}},icon("plus",13)," Bestillinger"),
      mdHint(),
      el("div",{style:"margin-top:10px"},
        el("button",{class:"btn danger",onclick:()=>{
          if(confirm("Slette seksjonen «"+s.title+"»?")){ C.sections.splice(si,1); render(); dirty=true; }
        }},icon("trash-2",14)," Slett seksjon"),
        " ",
        el("button",{class:"mini",onclick:()=>move(C.sections,si,-1)},icon("chevron-up",12)),
        el("button",{class:"mini",onclick:()=>move(C.sections,si,1)},icon("chevron-down",12)))));
  }
  return card;
}

/* ============ last + poll ============ */
async function load(){
  const r = await api("/api/content");
  C = await r.json();
}
async function poll(){
  if(editId) return; // ikke overskriv mens man redigerer
  try{
    const r = await api("/api/content");
    const fresh = await r.json();
    if(JSON.stringify(fresh)!==JSON.stringify(C) && !document.activeElement.matches("textarea,input")){
      C = fresh; render();
    }
  }catch(e){}
}
window.addEventListener("beforeunload",(e)=>{ if(dirty){ e.preventDefault(); e.returnValue=""; }});

load().then(render);
setInterval(poll, 15000);
</script>
