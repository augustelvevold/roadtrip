services:
  roadtrip:
    build: .
    container_name: roadtrip-2026
    ports:
      - "8080:3000"        # endre 8080 til ønsket port på LXC-en
    environment:
      # Verdiene settes i en gitignorert .env-fil ved siden av denne (se README).
      # Standardverdiene under brukes hvis .env mangler.
      - PIN=${PIN:-endre-meg}              # delt PIN/passord for innlogging
      - API_TOKEN=${API_TOKEN:-}           # valgfri token for skript/Claude via Bearer
      - MCP_PATH=${MCP_PATH:-}             # hemmelig sti for MCP-connector
      - SESSION_SECRET=${SESSION_SECRET:-} # valgfritt; genereres i ./data hvis tom
    volumes:
      - ./data:/app/data   # delt tilstand (avkrysninger + notater) overlever restart
    restart: unless-stopped
